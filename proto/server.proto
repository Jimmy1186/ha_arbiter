syntax = "proto3";
import "ha.proto";

option go_package = "kenmec/ha/protoGen;gen";

package ha_sync_pb;

message PeerArbiter {
  bool ecs   = 1;
  bool fleet = 2;
  bool ha    = 3;
}

// 從此ha送給另外一台ha的資料 不可接收資料 （client）
message StatusRequest {
  oneof payload {
    int32 hb                 = 1;
    bool  is_ha_connected    = 2;
    bool  is_fleet_connected = 3;
    bool  is_ecs_connected   = 4;

    PeerArbiter              peer_arbiter          = 5;
    string                   sync_mission          = 6;
    ha_pb.AgvWorkStatus      agv_work_status       = 7;
    ha_pb.MissionReport      mission_report        = 8;
    ha_pb.UpdateCargoInfo    update_cargo_info     = 9;
    ha_pb.SaveCargoInfo      save_cargo_info       = 10;
    ha_pb.UpdateAmrCargoInfo update_amr_cargo_info = 11;
    ha_pb.MissionAssign      mission_assign        = 12;
    string                   book_block            = 13;
  }
}

// 另外一台ha送來這台ha的資料 原則上不從此發送訊息到另外的ha (server)
message StatusResponse {
  oneof payload {
    int32 hb                 = 1;
    bool  is_ha_connected    = 2;
    bool  is_fleet_connected = 3;
    bool  is_ecs_connected   = 4;

    PeerArbiter              peer_arbiter          = 5;
    string                   sync_mission          = 6;
    ha_pb.AgvWorkStatus      agv_work_status       = 7;
    ha_pb.MissionReport      mission_report        = 8;
    ha_pb.UpdateCargoInfo    update_cargo_info     = 9;
    ha_pb.SaveCargoInfo      save_cargo_info       = 10;
    ha_pb.UpdateAmrCargoInfo update_amr_cargo_info = 11;
    ha_pb.MissionAssign      mission_assign        = 12;
    string                   book_block            = 13;
  }
}

// 這個檔案是用來與另外的ha互相溝通用
// bidirectional Streaming
service HASyncService {
    // Use streaming for continuous status exchange
  rpc ExchangeStatus (stream StatusRequest) returns (stream StatusResponse);
}