syntax = "proto3";

option go_package = "kenmec/ha/protoGen;gen";

package ha_pb;

message BookingInfo {
  int32  peripheral_type = 1;
  string action          = 2;
  string location_id     = 3;
  int32  level           = 4;
  string booker          = 5;
}

// 核心任務資訊

message AgvWorkStatus {
  string amr_id             = 1;
  bool   is_assigning       = 2;
  bool   is_assigned        = 3;
  string current_mission_id = 4;
  string last_update_at     = 5;
}

message MissionReport {
  string         report_type = 1;
  string         mission_id  = 2;
  string         amr_id      = 3;
  optional int32 distance    = 4;
  optional bool  is_abort    = 5;
  optional int32 step        = 6;
}

message MissionAssign  {
  string mission_id = 1;
  string assign_at  = 2;
  int32  battery    = 3;
  string amr_id     = 4;
}

message Cargo {
  string placement_order          = 1;
  string cargo_info_id            = 2;
  string custom_id                = 3;
  string custom_cargo_metadata_id = 4;
  string metadata                 = 5;
  string addon_metadata           = 6;
}

message UCICargo {
  string cargo_info_id            = 2;
  string custom_id                = 3;
  string custom_cargo_metadata_id = 4;
  string metadata                 = 5;
}

message UpdateCargoInfo {
  string            location_id = 1;
  int32             level       = 2;
  string            db_id       = 3;
  repeated UCICargo cargo       = 4;
}

message SaveCargoInfo {
  string area_type   = 1;
  string amr_id      = 2;
  string location_id = 3;
  int32  level       = 4;
  int32  height      = 5;
  string action_type = 6;
}

message UpdateAmrCargoInfo {
  string            amr_id = 1;
  repeated UCICargo cargo  = 2;
}

message SyncAllMemoryCargo {
  string cargo_json = 1;
  string area_type  = 2;
}

// 從ha送過去給交管的資料
message ClientMessage {
  oneof payload {
    int32 hb        = 1;
    bool  is_master = 2;

    string             sync_mission          = 3;
    AgvWorkStatus      agv_work_status       = 4;
    MissionReport      mission_report        = 5;
    UpdateCargoInfo    update_cargo_info     = 6;
    SaveCargoInfo      save_cargo_info       = 7;
    UpdateAmrCargoInfo update_amr_cargo_info = 8;
    MissionAssign      mission_assign        = 9;
    string             book_block            = 10;
    string             backup_connected      = 11;
    string             sync_all_mission      = 12;
    string             sync_all_db_cargo     = 13;
    SyncAllMemoryCargo sync_all_memory_cargo = 14;
  }
}

// 從交管送過來的資料
message ServerMessage {
  oneof payload {
    int32 hb = 1;
    // 啟動系統線線上後 會先發一次的狀態 交管只要有改編
    bool is_ecs_connected   = 2;
    bool is_fleet_connected = 3;

    string             sync_mission          = 4;
    AgvWorkStatus      agv_work_status       = 5;
    MissionReport      mission_report        = 6;
    UpdateCargoInfo    update_cargo_info     = 7;
    SaveCargoInfo      save_cargo_info       = 8;
    UpdateAmrCargoInfo update_amr_cargo_info = 9;
    MissionAssign      mission_assign        = 10;
    string             book_block            = 11;
    string             sync_all_mission      = 12;
    string             sync_all_db_cargo     = 13;
    SyncAllMemoryCargo sync_all_memory_cargo = 14;
  }
}

// 這個檔案是用來與本機交管系統溝通用
// bidirectional Streaming
service HAService {
  // bidirectional Streaming
  rpc HAStreaming(stream ClientMessage) returns (stream ServerMessage);
}